name: RVS PR Tests

# Runs after a successful "Build Relocatable Packages" run on pull_request (dispatched
# from that workflow with a resolved package_url), or on workflow_dispatch. Package URL:
# for post-build dispatch, the build workflow resolves the manylinux_2_28 listing and
# passes package_url. For manual runs, use package_url or secret (…/rvs base, listing,
# direct .tar.gz, or .deb). Optional pr_number + build_run_number inputs resolve the
# listing inside this workflow when package_url is unset. See README_PR_TESTS.md.
#
# Required repo configuration: README_PR_TESTS.md (same secrets/vars as nightly for SSH/ROCm).

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (set by Build Relocatable Packages post-build dispatch)'
        required: false
        default: ''
      build_run_number:
        description: 'Build workflow run number (post-build dispatch)'
        required: false
        default: ''
      package_url:
        description: 'HTTPS …/rvs/ root, …/manylinux_*/ listing, direct *-Linux.tar.gz, or .deb (empty → secrets; not used when pr_number + build_run_number are set)'
        required: false
        default: ''
      target_node:
        description: 'Hostname/IP of node to install RVS on and run tests (default: secrets.RVS_TARGET_NODE)'
        required: false
        default: ''
      target_user:
        description: 'SSH user on the target node (default: secrets.RVS_TARGET_USER)'
        required: false
        default: ''
      remote_work_dir:
        description: 'Working dir on the target node (default: vars.RVS_REMOTE_WORK_DIR or /tmp/rvs-pr-<run_id>)'
        required: false
        default: ''
      target_rocm_path:
        description: 'ROCm tarball install root on the target node (default: vars.RVS_TARGET_ROCM_PATH)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: rvs-pr-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

env:
  PR_DEB_PACKAGE_URL: ${{ secrets.RVS_PR_DEB_PACKAGE_URL || secrets.RVS_PR_PACKAGE_URL || '' }}

jobs:
  install-rvs-on-target:
    name: Install RVS on target node
    runs-on: ${{ vars.RVS_NIGHTLY_INDEX_RUNNER_LABEL || vars.RVS_TEST_RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 120
    outputs:
      tarball_url:      ${{ steps.resolve.outputs.tarball_url }}
      tarball_name:     ${{ steps.resolve.outputs.tarball_name }}
      remote_work_dir:  ${{ steps.prepare.outputs.remote_work_dir }}
      rocm_major:       ${{ steps.prepare.outputs.rocm_major }}
      install_dir:      ${{ steps.prepare.outputs.install_dir }}
      rvs_bin:          ${{ steps.prepare.outputs.rvs_bin }}
    env:
      TARGET_NODE:      ${{ inputs.target_node || secrets.RVS_TARGET_NODE }}
      TARGET_USER:      ${{ inputs.target_user || secrets.RVS_TARGET_USER }}
      TARGET_ROCM_PATH: ${{ inputs.target_rocm_path || vars.RVS_TARGET_ROCM_PATH }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set package URL (manual or post-build dispatch)
        if: inputs.pr_number == '' || inputs.build_run_number == ''
        env:
          PACKAGE_INPUT: ${{ inputs.package_url }}
          SECRET_PKG: ${{ secrets.RVS_PR_DEB_PACKAGE_URL || secrets.RVS_PR_PACKAGE_URL }}
        run: |
          set -euo pipefail
          u="${PACKAGE_INPUT:-}"
          if [ -z "${u}" ]; then
            u="${SECRET_PKG:-}"
          fi
          if [ -z "${u}" ]; then
            echo "::error::Set Actions secret RVS_PR_DEB_PACKAGE_URL (or RVS_PR_PACKAGE_URL), or pass workflow_dispatch input package_url."
            exit 1
          fi
          {
            echo "PR_PACKAGE_ROOT_URL<<RVS_PR_PKG_URL"
            printf '%s\n' "$u"
            echo "RVS_PR_PKG_URL"
          } >> "$GITHUB_ENV"

      - name: Set package URL (after successful PR build)
        if: inputs.pr_number != '' && inputs.build_run_number != ''
        env:
          SECRET_PKG: ${{ secrets.RVS_PR_DEB_PACKAGE_URL || secrets.RVS_PR_PACKAGE_URL }}
          PR_NUMBER: ${{ inputs.pr_number }}
          RUN_NUMBER: ${{ inputs.build_run_number }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import subprocess
          import sys

          base = (os.environ.get("SECRET_PKG") or "").strip().rstrip("/")
          if not base:
              print("::error::Set RVS_PR_DEB_PACKAGE_URL (or RVS_PR_PACKAGE_URL) to the HTTPS rvs listing base (…/rvs) for post-build runs.", file=sys.stderr)
              sys.exit(1)
          low = base.lower()
          if low.endswith(".deb") or low.endswith(".tar.gz"):
              print("::error::For post-build dispatch, set the secret to the /rvs HTTPS base only, not a direct .deb or .tar.gz URL.", file=sys.stderr)
              sys.exit(1)

          pr = int(os.environ["PR_NUMBER"])
          run_number = int(os.environ["RUN_NUMBER"])
          # Primary: matches .github/scripts/rvs-s3-upload-route.sh — rvs/<pr>/merge/<GITHUB_RUN_NUMBER>/manylinux_2_28
          # Fallback: some mirrors use rvs/<run_number>/merge/<pr>/manylinux_2_28
          candidates = [
              f"{base}/{pr}/merge/{run_number}/manylinux_2_28",
              f"{base}/{run_number}/merge/{pr}/manylinux_2_28",
          ]

          def listing_reachable(url: str) -> bool:
              p = subprocess.run(
                  [
                      "curl",
                      "-sfS",
                      "--max-time",
                      "60",
                      "-A",
                      "Mozilla/5.0 (compatible; RVS-PR-Tests/1.0)",
                      "-o",
                      "/dev/null",
                      url.rstrip("/") + "/",
                  ],
                  capture_output=True,
              )
              return p.returncode == 0

          listing = ""
          for cand in candidates:
              if listing_reachable(cand):
                  listing = cand
                  break
          if not listing:
              print(
                  "::error::Could not reach a manylinux_2_28 listing for this PR build. Tried:\n  "
                  + "\n  ".join(c + "/" for c in candidates),
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"::notice::Using manylinux_2_28 listing from this Build workflow run: {listing}/")

          out_path = os.environ["GITHUB_ENV"]
          with open(out_path, "a", encoding="utf-8") as f:
              f.write("PR_PACKAGE_ROOT_URL<<RVS_PR_PKG_URL\n")
              f.write(listing + "\n")
              f.write("RVS_PR_PKG_URL\n")
          PY

      - name: Resolve package URL (Linux tarball or .deb)
        id: resolve
        run: |
          chmod +x rvs_pr_test.sh
          if [ -z "${PR_PACKAGE_ROOT_URL:-}" ]; then
            echo "::error::PR_PACKAGE_ROOT_URL is unset after configure step."
            exit 1
          fi
          ./rvs_pr_test.sh resolve-package-url

      - name: Validate configuration and derive paths
        id: prepare
        env:
          TARBALL_NAME: ${{ steps.resolve.outputs.tarball_name }}
          INPUT_REMOTE_WORK_DIR: ${{ inputs.remote_work_dir }}
          VAR_REMOTE_WORK_DIR:   ${{ vars.RVS_REMOTE_WORK_DIR }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x rvs_pr_test.sh
          ./rvs_pr_test.sh validate-config

      - name: Export paths for remaining steps
        run: |
          {
            echo "REMOTE_WORK_DIR=${{ steps.prepare.outputs.remote_work_dir }}"
            echo "ROCM_MAJOR=${{ steps.prepare.outputs.rocm_major }}"
            echo "INSTALL_DIR=${{ steps.prepare.outputs.install_dir }}"
            echo "RVS_BIN=${{ steps.prepare.outputs.rvs_bin }}"
          } >> "$GITHUB_ENV"

      # Job outputs can drop tarball_url/name when passed to create-test-report; artifact is reliable.
      - name: Upload package metadata for report job
        uses: actions/upload-artifact@v4
        with:
          name: rvs-pr-pkg-meta-${{ github.run_id }}
          path: ./pkg-meta/
          retention-days: 1
          if-no-files-found: error

      - name: Setup SSH for target node
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RVS_TARGET_SSH_KEY }}
        run: |
          chmod +x rvs_pr_test.sh
          ./rvs_pr_test.sh setup-ssh

      - name: Download package on orchestrator runner
        run: ./rvs_pr_test.sh download-tarball

      - name: Copy package to target node
        run: ./rvs_pr_test.sh copy-to-target

      - name: Verify ROCm prerequisites on target node
        run: ./rvs_pr_test.sh verify-rocm

      - name: Install RVS on target node
        run: ./rvs_pr_test.sh install-rvs

      - name: Verify RVS binary library resolution on target node
        run: ./rvs_pr_test.sh verify-rvs-binary

      - name: Cleanup local SSH state
        if: always()
        run: ./rvs_pr_test.sh cleanup-local-ssh

  run-rvs-level-4:
    name: Run RVS level 4 on target node
    needs: [install-rvs-on-target]
    if: needs.install-rvs-on-target.result == 'success'
    runs-on: ${{ vars.RVS_TEST_RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 180
    outputs:
      rc:                   ${{ steps.level4.outputs.rc }}
      start:                ${{ steps.level4.outputs.start }}
      end:                  ${{ steps.level4.outputs.end }}
      rvs_version:          ${{ steps.versions.outputs.rvs_version }}
      target_rocm_version:  ${{ steps.versions.outputs.target_rocm_version }}
    env:
      TARGET_NODE:      ${{ inputs.target_node || secrets.RVS_TARGET_NODE }}
      TARGET_USER:      ${{ inputs.target_user || secrets.RVS_TARGET_USER }}
      TARGET_ROCM_PATH: ${{ inputs.target_rocm_path || vars.RVS_TARGET_ROCM_PATH }}
      REMOTE_WORK_DIR:  ${{ needs.install-rvs-on-target.outputs.remote_work_dir }}
      ROCM_MAJOR:       ${{ needs.install-rvs-on-target.outputs.rocm_major }}
      INSTALL_DIR:      ${{ needs.install-rvs-on-target.outputs.install_dir }}
      RVS_BIN:          ${{ needs.install-rvs-on-target.outputs.rvs_bin }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH for target node
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RVS_TARGET_SSH_KEY }}
        run: |
          chmod +x rvs_pr_test.sh
          ./rvs_pr_test.sh setup-ssh

      - name: Run RVS level 4 on target node
        id: level4
        run: ./rvs_pr_test.sh run-level4

      - name: Collect logs from target node
        if: always()
        run: ./rvs_pr_test.sh collect-logs

      - name: Capture RVS and ROCm versions from target
        id: versions
        if: always()
        run: ./rvs_pr_test.sh capture-versions

      - name: Upload test logs (intermediate)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rvs-pr-logs-${{ github.run_id }}
          path: ./reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Cleanup remote work dir and local SSH state
        if: always()
        run: |
          ./rvs_pr_test.sh cleanup-remote
          ./rvs_pr_test.sh cleanup-local-ssh

  create-test-report:
    name: Create Test Report
    needs: [install-rvs-on-target, run-rvs-level-4]
    runs-on: ${{ vars.RUNNER_LABEL_UTILITY || 'ubuntu-latest' }}
    if: always() && !cancelled() && needs.install-rvs-on-target.result == 'success' && needs.run-rvs-level-4.result != 'skipped'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download test logs
        uses: actions/download-artifact@v4
        with:
          name: rvs-pr-logs-${{ github.run_id }}
          path: ./reports
        continue-on-error: true

      - name: Download package metadata
        uses: actions/download-artifact@v4
        with:
          name: rvs-pr-pkg-meta-${{ github.run_id }}
          path: ./pkg-meta

      - name: Build test report
        id: report
        env:
          TARBALL_URL:          ${{ needs.install-rvs-on-target.outputs.tarball_url }}
          TARBALL_NAME:         ${{ needs.install-rvs-on-target.outputs.tarball_name }}
          TARGET_ROCM_PATH:     ${{ inputs.target_rocm_path || vars.RVS_TARGET_ROCM_PATH }}
          REMOTE_WORK_DIR:      ${{ needs.install-rvs-on-target.outputs.remote_work_dir }}
          RVS_BIN:              ${{ needs.install-rvs-on-target.outputs.rvs_bin }}
          RVS_LEVEL4_RC:        ${{ needs.run-rvs-level-4.outputs.rc }}
          RVS_LEVEL4_START:     ${{ needs.run-rvs-level-4.outputs.start }}
          RVS_LEVEL4_END:       ${{ needs.run-rvs-level-4.outputs.end }}
          RVS_VERSION:          ${{ needs.run-rvs-level-4.outputs.rvs_version }}
          TARGET_ROCM_VERSION:  ${{ needs.run-rvs-level-4.outputs.target_rocm_version }}
          GITHUB_RUN_ID:        ${{ github.run_id }}
          GITHUB_SERVER_URL:    ${{ github.server_url }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GITHUB_EVENT_NAME:    ${{ github.event_name }}
        run: |
          chmod +x rvs_pr_test.sh
          mkdir -p ./reports
          ./rvs_pr_test.sh build-report

      - name: Upload report and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rvs-pr-report-${{ github.run_id }}
          path: ./reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Fail the workflow if level 4 failed
        if: steps.report.outputs.overall == 'FAIL' || needs.run-rvs-level-4.result == 'failure'
        run: |
          echo "::error::RVS test failure — level4 rc=${{ needs.run-rvs-level-4.outputs.rc }}"
          exit 1
