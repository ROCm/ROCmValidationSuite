name: RVS PR Tests

# Same orchestration pattern as rvs-nightly-tests.yml: package URL from
# secrets.RVS_PR_DEB_PACKAGE_URL (or legacy secrets.RVS_PR_PACKAGE_URL) into env.PR_DEB_PACKAGE_URL
# (no baked-in default URL in this repo). Resolves the Linux relocatable tarball (*.tar.gz)
# from an HTTPS index root ending in /rvs (with or without trailing slash), or accepts a
# direct tarball / .deb URL (see rvs_pr_test.sh resolve-package-url).
# Then copy to a configurable target over SSH, extract or dpkg install, run RVS level 4, report.
# Scheduled runs poll the CDN root from secrets on a cron; if the resolved artifact
# key (build/pr/tgz) changed since the last successful test, install + level 4 run.
# Manual workflow_dispatch always runs tests. See README_PR_TESTS.md.
#
# Required repo configuration: see README_PR_TESTS.md (same secrets/vars as nightly
# for SSH and ROCm path).

on:
  schedule:
    # Poll hourly (UTC) for a new PR package on the CDN root configured in secrets.
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      package_url:
        description: 'Optional override: HTTPS …/rvs/ index root (e.g. https://host/rvs/), direct *-Linux.tar.gz URL, or .deb URL (empty → secrets RVS_PR_DEB_PACKAGE_URL / RVS_PR_PACKAGE_URL; required for schedule if unset)'
        required: false
        default: ''
      target_node:
        description: 'Hostname/IP of node to install RVS on and run tests (default: secrets.RVS_TARGET_NODE)'
        required: false
        default: ''
      target_user:
        description: 'SSH user on the target node (default: secrets.RVS_TARGET_USER)'
        required: false
        default: ''
      remote_work_dir:
        description: 'Working dir on the target node (default: vars.RVS_REMOTE_WORK_DIR or /tmp/rvs-pr-<run_id>)'
        required: false
        default: ''
      target_rocm_path:
        description: 'ROCm tarball install root on the target node (default: vars.RVS_TARGET_ROCM_PATH)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: rvs-pr-${{ github.workflow }}
  cancel-in-progress: false

env:
  # Set secrets to your HTTPS …/rvs listing root (no deeper path required), a direct *-Linux.tar.gz URL, or a .deb URL.
  PR_DEB_PACKAGE_URL: ${{ secrets.RVS_PR_DEB_PACKAGE_URL || secrets.RVS_PR_PACKAGE_URL || '' }}

jobs:
  detect-new-artifact:
    name: Detect new PR package on CDN
    runs-on: ${{ vars.RVS_NIGHTLY_INDEX_RUNNER_LABEL || vars.RVS_TEST_RUNNER_LABEL || 'self-hosted' }}
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
      artifact_key: ${{ steps.decide.outputs.artifact_key }}
    env:
      PR_PACKAGE_ROOT_URL: ${{ inputs.package_url || env.PR_DEB_PACKAGE_URL }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore last artifact key (scheduled poll only)
        if: github.event_name == 'schedule'
        id: restore_marker
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: rvs_pr_last_artifact_key.txt
          key: rvs-pr-artifact-${{ github.run_id }}
          restore-keys: |
            rvs-pr-artifact-

      - name: Decide whether to run tests
        id: decide
        run: |
          chmod +x rvs_pr_test.sh
          if [ -z "${PR_PACKAGE_ROOT_URL:-}" ]; then
            echo "::error::PR_PACKAGE_ROOT_URL is empty. Set Actions secret RVS_PR_DEB_PACKAGE_URL (or RVS_PR_PACKAGE_URL) to your HTTPS …/rvs index root, a direct *-Linux.tar.gz URL, or a .deb URL, or pass workflow_dispatch input package_url."
            exit 1
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            {
              echo "artifact_key<<RVS_PR_ARTIFACT_KEY"
              printf 'manual-%s\n' "${{ github.run_id }}"
              echo "RVS_PR_ARTIFACT_KEY"
            } >> "$GITHUB_OUTPUT"
            echo "::notice::Manual run — always executing tests."
            exit 0
          fi
          NEW="$(./rvs_pr_test.sh peek-latest-artifact-key)"
          OLD="$(tr -d '\n' < rvs_pr_last_artifact_key.txt 2>/dev/null || true)"
          {
            echo "artifact_key<<RVS_PR_ARTIFACT_KEY"
            printf '%s\n' "$NEW"
            echo "RVS_PR_ARTIFACT_KEY"
          } >> "$GITHUB_OUTPUT"
          if [ "$NEW" = "$OLD" ] && [ -n "$OLD" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CDN artifact unchanged (${NEW}); skipping install and tests."
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::New or first-seen artifact key: ${NEW} (previous: ${OLD:-<none>})"
          fi

  install-rvs-on-target:
    name: Install RVS on target node
    needs: [detect-new-artifact]
    if: needs.detect-new-artifact.outputs.proceed == 'true'
    runs-on: ${{ vars.RVS_NIGHTLY_INDEX_RUNNER_LABEL || vars.RVS_TEST_RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 120
    outputs:
      tarball_url:      ${{ steps.resolve.outputs.tarball_url }}
      tarball_name:     ${{ steps.resolve.outputs.tarball_name }}
      remote_work_dir:  ${{ steps.prepare.outputs.remote_work_dir }}
      rocm_major:       ${{ steps.prepare.outputs.rocm_major }}
      install_dir:      ${{ steps.prepare.outputs.install_dir }}
      rvs_bin:          ${{ steps.prepare.outputs.rvs_bin }}
    env:
      TARGET_NODE:      ${{ inputs.target_node || secrets.RVS_TARGET_NODE }}
      TARGET_USER:      ${{ inputs.target_user || secrets.RVS_TARGET_USER }}
      TARGET_ROCM_PATH: ${{ inputs.target_rocm_path || vars.RVS_TARGET_ROCM_PATH }}
      PR_PACKAGE_ROOT_URL: ${{ inputs.package_url || env.PR_DEB_PACKAGE_URL }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve package URL (Linux tarball or .deb)
        id: resolve
        run: |
          chmod +x rvs_pr_test.sh
          if [ -z "${PR_PACKAGE_ROOT_URL:-}" ]; then
            echo "::error::PR_PACKAGE_ROOT_URL is empty. Set Actions secret RVS_PR_DEB_PACKAGE_URL (or RVS_PR_PACKAGE_URL) to your HTTPS …/rvs index root, a direct *-Linux.tar.gz URL, or a .deb URL, or pass workflow_dispatch input package_url."
            exit 1
          fi
          ./rvs_pr_test.sh resolve-package-url

      - name: Validate configuration and derive paths
        id: prepare
        env:
          TARBALL_NAME: ${{ steps.resolve.outputs.tarball_name }}
          INPUT_REMOTE_WORK_DIR: ${{ inputs.remote_work_dir }}
          VAR_REMOTE_WORK_DIR:   ${{ vars.RVS_REMOTE_WORK_DIR }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x rvs_pr_test.sh
          ./rvs_pr_test.sh validate-config

      - name: Export paths for remaining steps
        run: |
          {
            echo "REMOTE_WORK_DIR=${{ steps.prepare.outputs.remote_work_dir }}"
            echo "ROCM_MAJOR=${{ steps.prepare.outputs.rocm_major }}"
            echo "INSTALL_DIR=${{ steps.prepare.outputs.install_dir }}"
            echo "RVS_BIN=${{ steps.prepare.outputs.rvs_bin }}"
          } >> "$GITHUB_ENV"

      - name: Setup SSH for target node
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RVS_TARGET_SSH_KEY }}
        run: |
          chmod +x rvs_pr_test.sh
          ./rvs_pr_test.sh setup-ssh

      - name: Download package on orchestrator runner
        run: ./rvs_pr_test.sh download-tarball

      - name: Copy package to target node
        run: ./rvs_pr_test.sh copy-to-target

      - name: Verify ROCm prerequisites on target node
        run: ./rvs_pr_test.sh verify-rocm

      - name: Install RVS on target node
        run: ./rvs_pr_test.sh install-rvs

      - name: Verify RVS binary library resolution on target node
        run: ./rvs_pr_test.sh verify-rvs-binary

      - name: Cleanup local SSH state
        if: always()
        run: ./rvs_pr_test.sh cleanup-local-ssh

  run-rvs-level-4:
    name: Run RVS level 4 on target node
    needs: [install-rvs-on-target]
    runs-on: ${{ vars.RVS_TEST_RUNNER_LABEL || 'self-hosted' }}
    timeout-minutes: 180
    outputs:
      rc:                   ${{ steps.level4.outputs.rc }}
      start:                ${{ steps.level4.outputs.start }}
      end:                  ${{ steps.level4.outputs.end }}
      rvs_version:          ${{ steps.versions.outputs.rvs_version }}
      target_rocm_version:  ${{ steps.versions.outputs.target_rocm_version }}
    env:
      TARGET_NODE:      ${{ inputs.target_node || secrets.RVS_TARGET_NODE }}
      TARGET_USER:      ${{ inputs.target_user || secrets.RVS_TARGET_USER }}
      TARGET_ROCM_PATH: ${{ inputs.target_rocm_path || vars.RVS_TARGET_ROCM_PATH }}
      REMOTE_WORK_DIR:  ${{ needs.install-rvs-on-target.outputs.remote_work_dir }}
      ROCM_MAJOR:       ${{ needs.install-rvs-on-target.outputs.rocm_major }}
      INSTALL_DIR:      ${{ needs.install-rvs-on-target.outputs.install_dir }}
      RVS_BIN:          ${{ needs.install-rvs-on-target.outputs.rvs_bin }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH for target node
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RVS_TARGET_SSH_KEY }}
        run: |
          chmod +x rvs_pr_test.sh
          ./rvs_pr_test.sh setup-ssh

      - name: Run RVS level 4 on target node
        id: level4
        run: ./rvs_pr_test.sh run-level4

      - name: Collect logs from target node
        if: always()
        run: ./rvs_pr_test.sh collect-logs

      - name: Capture RVS and ROCm versions from target
        id: versions
        if: always()
        run: ./rvs_pr_test.sh capture-versions

      - name: Upload test logs (intermediate)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rvs-pr-logs-${{ github.run_id }}
          path: ./reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Cleanup remote work dir and local SSH state
        if: always()
        run: |
          ./rvs_pr_test.sh cleanup-remote
          ./rvs_pr_test.sh cleanup-local-ssh

  create-test-report:
    name: Create Test Report
    needs: [install-rvs-on-target, run-rvs-level-4]
    runs-on: ${{ vars.RUNNER_LABEL_UTILITY || 'ubuntu-latest' }}
    if: always() && !cancelled() && needs.install-rvs-on-target.result == 'success' && needs.run-rvs-level-4.result != 'skipped'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download test logs
        uses: actions/download-artifact@v4
        with:
          name: rvs-pr-logs-${{ github.run_id }}
          path: ./reports
        continue-on-error: true

      - name: Build test report
        id: report
        env:
          TARBALL_URL:          ${{ needs.install-rvs-on-target.outputs.tarball_url }}
          TARBALL_NAME:         ${{ needs.install-rvs-on-target.outputs.tarball_name }}
          TARGET_ROCM_PATH:     ${{ inputs.target_rocm_path || vars.RVS_TARGET_ROCM_PATH }}
          REMOTE_WORK_DIR:      ${{ needs.install-rvs-on-target.outputs.remote_work_dir }}
          RVS_BIN:              ${{ needs.install-rvs-on-target.outputs.rvs_bin }}
          RVS_LEVEL4_RC:        ${{ needs.run-rvs-level-4.outputs.rc }}
          RVS_LEVEL4_START:     ${{ needs.run-rvs-level-4.outputs.start }}
          RVS_LEVEL4_END:       ${{ needs.run-rvs-level-4.outputs.end }}
          RVS_VERSION:          ${{ needs.run-rvs-level-4.outputs.rvs_version }}
          TARGET_ROCM_VERSION:  ${{ needs.run-rvs-level-4.outputs.target_rocm_version }}
          GITHUB_RUN_ID:        ${{ github.run_id }}
          GITHUB_SERVER_URL:    ${{ github.server_url }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GITHUB_EVENT_NAME:    ${{ github.event_name }}
        run: |
          chmod +x rvs_pr_test.sh
          mkdir -p ./reports
          ./rvs_pr_test.sh build-report

      - name: Upload report and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rvs-pr-report-${{ github.run_id }}
          path: ./reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Fail the workflow if level 4 failed
        if: steps.report.outputs.overall == 'FAIL' || needs.run-rvs-level-4.result == 'failure'
        run: |
          echo "::error::RVS test failure — level4 rc=${{ needs.run-rvs-level-4.outputs.rc }}"
          exit 1

  save-pr-artifact-marker:
    name: Save PR artifact marker after successful level 4
    needs: [detect-new-artifact, run-rvs-level-4]
    if: github.event_name == 'schedule' && needs.detect-new-artifact.outputs.proceed == 'true' && needs.run-rvs-level-4.outputs.rc == '0'
    runs-on: ubuntu-latest
    steps:
      - name: Write artifact key for next poll
        env:
          KEY: ${{ needs.detect-new-artifact.outputs.artifact_key }}
        run: |
          set -euo pipefail
          printf '%s\n' "$KEY" > rvs_pr_last_artifact_key.txt
          test -s rvs_pr_last_artifact_key.txt

      - name: Save artifact key to Actions cache
        uses: actions/cache/save@v4
        with:
          path: rvs_pr_last_artifact_key.txt
          key: rvs-pr-artifact-${{ github.run_id }}
