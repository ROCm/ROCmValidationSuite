name: Build Relocatable Packages

on:
  push:
    branches:
      - master
      - main
      - 'release/**'
  pull_request:
    branches:
      - master
      - main
  schedule:
    # Run daily at 5:00 AM PST (13:00 UTC; PST is UTC-8)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      rocm_version:
        description: 'ROCm version (e.g., 7.11.0a20260121)'
        required: false
        default: ''
      gpu_family:
        description: 'GPU family target'
        required: false
        type: choice
        options:
          - gfx94X-dcgpu
          - gfx950-dcgpu
          - gfx110X-all
          - gfx1151
          - gfx120X-all
        default: 'gfx110X-all'

env:
  ROCM_VERSION: '7.11.0a20260121'
  GPU_FAMILY: 'gfx110X-all'
  BUILD_TYPE: Release

jobs:
  build-ubuntu:
    name: Build Ubuntu Packages
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        ubuntu_version: ['22.04']
    permissions:
      id-token: write
      contents: read
    outputs:
      s3_bucket_ubuntu: ${{ steps.upload-s3-ubuntu.outputs.bucket }}
      s3_paths_ubuntu: ${{ steps.upload-s3-ubuntu.outputs.paths }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set ROCm Version and GPU Family
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled run: use latest ROCm (leave ROCM_VERSION unset for auto-fetch)
            echo "ROCM_VERSION=" >> $GITHUB_ENV
            echo "Scheduled run: will auto-fetch latest ROCm version"
          fi
          if [ -n "${{ github.event.inputs.rocm_version }}" ]; then
            echo "ROCM_VERSION=${{ github.event.inputs.rocm_version }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ github.event.inputs.gpu_family }}" ]; then
            echo "GPU_FAMILY=${{ github.event.inputs.gpu_family }}" >> $GITHUB_ENV
          fi

      - name: Build and Package RVS
        run: |
          # Make build script executable
          chmod +x build_packages_local.sh
          
          # Run build script with sudo (Ubuntu runner needs sudo for apt-get)
          sudo ROCM_VERSION=${{ env.ROCM_VERSION }} \
          GPU_FAMILY=${{ env.GPU_FAMILY }} \
          BUILD_TYPE=${{ env.BUILD_TYPE }} \
          ./build_packages_local.sh

      - name: Verify DEB Package
        run: |
          cd ./build
          DEB_FILE=$(ls rocm-validation-suite*.deb | head -1)
          if [ -n "$DEB_FILE" ]; then
            echo "=== DEB Package Info ==="
            dpkg-deb -I "$DEB_FILE"
            echo ""
            echo "=== DEB Package Contents (first 30 files) ==="
            dpkg-deb -c "$DEB_FILE" | head -30
            echo ""
            echo "Package filename: $DEB_FILE"
          fi

      - name: Upload Ubuntu Packages
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-${{ matrix.ubuntu_version }}-packages-${{ env.GPU_FAMILY }}
          path: |
            build/rocm-validation-suite*.deb
            build/rocm-validation-suite*.tar.gz
          retention-days: 30

      # S3 upload only for repo ROCm/ROCmValidationSuite (schedule, release/* push, master/main push, or same-repo PR)
      - name: Install AWS CLI
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        run: sudo apt-get update && sudo apt-get install -y awscli

      - name: Configure AWS credentials
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # vars.AWS_S3_BUCKET = repository variable. Paths: nightly (schedule) → nightly/deb, nightly/tar; release/* → release/<branch>/deb, .../tar; else → <ref>/<run_number>/ubuntu-22.04
      - name: Upload Ubuntu packages to S3
        id: upload-s3-ubuntu
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          BUCKET="${{ vars.AWS_S3_BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "::warning::AWS_S3_BUCKET not set. Skipping S3 upload."
            exit 0
          fi
          BASE="rocm-validation-suite"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled build: uploading to nightly/deb and nightly/tar"
            aws s3 cp ./build "s3://${BUCKET}/${BASE}/nightly/deb/" --recursive --exclude "*" --include "rocm-validation-suite*.deb" --no-progress
            aws s3 cp ./build "s3://${BUCKET}/${BASE}/nightly/tar/" --recursive --exclude "*" --include "rocm-validation-suite*.tar.gz" --no-progress
            echo "Listing s3://${BUCKET}/${BASE}/nightly/deb/"
            aws s3 ls "s3://${BUCKET}/${BASE}/nightly/deb/" --human-readable
            echo "Listing s3://${BUCKET}/${BASE}/nightly/tar/"
            aws s3 ls "s3://${BUCKET}/${BASE}/nightly/tar/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=Ubuntu DEB|${BASE}/nightly/deb||Ubuntu TGZ|${BASE}/nightly/tar" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            REF_NAME="${{ github.ref_name }}"
            echo "Release branch build: uploading to release/${REF_NAME}/deb and release/${REF_NAME}/tar"
            aws s3 cp ./build "s3://${BUCKET}/${BASE}/release/${REF_NAME}/deb/" --recursive --exclude "*" --include "rocm-validation-suite*.deb" --no-progress
            aws s3 cp ./build "s3://${BUCKET}/${BASE}/release/${REF_NAME}/tar/" --recursive --exclude "*" --include "rocm-validation-suite*.tar.gz" --no-progress
            echo "Listing s3://${BUCKET}/${BASE}/release/${REF_NAME}/deb/"
            aws s3 ls "s3://${BUCKET}/${BASE}/release/${REF_NAME}/deb/" --human-readable
            echo "Listing s3://${BUCKET}/${BASE}/release/${REF_NAME}/tar/"
            aws s3 ls "s3://${BUCKET}/${BASE}/release/${REF_NAME}/tar/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=Ubuntu DEB|${BASE}/release/${REF_NAME}/deb||Ubuntu TGZ|${BASE}/release/${REF_NAME}/tar" >> $GITHUB_OUTPUT
          else
            PREFIX="${BASE}/${{ github.ref_name }}/${{ github.run_number }}/ubuntu-${{ matrix.ubuntu_version }}"
            echo "Uploading to s3://${BUCKET}/${PREFIX}/"
            aws s3 cp ./build "s3://${BUCKET}/${PREFIX}/" --recursive --exclude "*" --include "rocm-validation-suite*.deb" --include "rocm-validation-suite*.tar.gz" --no-progress
            echo "Listing s3://${BUCKET}/${PREFIX}/"
            aws s3 ls "s3://${BUCKET}/${PREFIX}/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=Ubuntu packages|${PREFIX}" >> $GITHUB_OUTPUT
          fi
          echo "Done."

  build-centos:
    name: Build CentOS/RHEL Packages (manylinux_2_28)
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    strategy:
      matrix:
        distro: ['manylinux_2_28']
    permissions:
      id-token: write
      contents: read
    outputs:
      s3_bucket_centos: ${{ steps.upload-s3-centos.outputs.bucket }}
      s3_paths_centos: ${{ steps.upload-s3-centos.outputs.paths }}
    
    steps:
      - name: Install Git (for checkout)
        run: |
          yum install -y git

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set ROCm Version and GPU Family
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "ROCM_VERSION=" >> $GITHUB_ENV
            echo "Scheduled run: will auto-fetch latest ROCm version"
          elif [ -n "${{ github.event.inputs.rocm_version }}" ]; then
            echo "ROCM_VERSION=${{ github.event.inputs.rocm_version }}" >> $GITHUB_ENV
          else
            echo "ROCM_VERSION=${{ env.ROCM_VERSION }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ github.event.inputs.gpu_family }}" ]; then
            echo "GPU_FAMILY=${{ github.event.inputs.gpu_family }}" >> $GITHUB_ENV
          else
            echo "GPU_FAMILY=${{ env.GPU_FAMILY }}" >> $GITHUB_ENV
          fi

      - name: Build and Package RVS
        run: |
          # Make build script executable
          chmod +x build_packages_local.sh
          
          # Run build script (no sudo needed - container runs as root)
          ROCM_VERSION=${{ env.ROCM_VERSION }} \
          GPU_FAMILY=${{ env.GPU_FAMILY }} \
          BUILD_TYPE=${{ env.BUILD_TYPE }} \
          ./build_packages_local.sh

      - name: Verify RPM Package
        run: |
          cd ./build
          RPM_FILE=$(ls rocm-validation-suite*.rpm | head -1)
          if [ -n "$RPM_FILE" ]; then
            echo "=== RPM Package Info ==="
            rpm -qip "$RPM_FILE"
            echo ""
            echo "=== RPM Package Contents (first 30 files) ==="
            rpm -qlp "$RPM_FILE" | head -30
            echo ""
            echo "=== RPM Dependencies ==="
            rpm -qRp "$RPM_FILE"
            echo ""
            echo "Package filename: $RPM_FILE"
          fi

      - name: Upload CentOS/RHEL Packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.distro }}-packages-${{ env.GPU_FAMILY }}
          path: |
            build/rocm-validation-suite*.rpm
            build/rocm-validation-suite*.tar.gz
          retention-days: 30

      # S3 upload only for repo ROCm/ROCmValidationSuite (schedule, release/* push, master/main push, or same-repo PR)
      - name: Install AWS CLI
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          python3 -m pip install --break-system-packages awscli || (yum install -y python3-pip && pip3 install awscli)

      - name: Configure AWS credentials
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # vars.AWS_S3_BUCKET = repository variable. Paths: nightly (schedule) → nightly/rpm, nightly/tar; release/* → release/<branch>/rpm, .../tar; else → <ref>/<run_number>/manylinux_2_28
      - name: Upload CentOS/RHEL packages to S3
        id: upload-s3-centos
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          BUCKET="${{ vars.AWS_S3_BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "::warning::AWS_S3_BUCKET not set. Skipping S3 upload."
            exit 0
          fi
          BASE="rocm-validation-suite"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled build: uploading to nightly/rpm and nightly/tar"
            aws s3 cp ./build "s3://${BUCKET}/${BASE}/nightly/rpm/" --recursive --exclude "*" --include "rocm-validation-suite*.rpm" --no-progress
            aws s3 cp ./build "s3://${BUCKET}/${BASE}/nightly/tar/" --recursive --exclude "*" --include "rocm-validation-suite*.tar.gz" --no-progress
            echo "Listing s3://${BUCKET}/${BASE}/nightly/rpm/"
            aws s3 ls "s3://${BUCKET}/${BASE}/nightly/rpm/" --human-readable
            echo "Listing s3://${BUCKET}/${BASE}/nightly/tar/"
            aws s3 ls "s3://${BUCKET}/${BASE}/nightly/tar/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=CentOS/RHEL RPM|${BASE}/nightly/rpm||CentOS/RHEL TGZ|${BASE}/nightly/tar" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            REF_NAME="${{ github.ref_name }}"
            echo "Release branch build: uploading to release/${REF_NAME}/rpm and release/${REF_NAME}/tar"
            aws s3 cp ./build "s3://${BUCKET}/${BASE}/release/${REF_NAME}/rpm/" --recursive --exclude "*" --include "rocm-validation-suite*.rpm" --no-progress
            aws s3 cp ./build "s3://${BUCKET}/${BASE}/release/${REF_NAME}/tar/" --recursive --exclude "*" --include "rocm-validation-suite*.tar.gz" --no-progress
            echo "Listing s3://${BUCKET}/${BASE}/release/${REF_NAME}/rpm/"
            aws s3 ls "s3://${BUCKET}/${BASE}/release/${REF_NAME}/rpm/" --human-readable
            echo "Listing s3://${BUCKET}/${BASE}/release/${REF_NAME}/tar/"
            aws s3 ls "s3://${BUCKET}/${BASE}/release/${REF_NAME}/tar/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=CentOS/RHEL RPM|${BASE}/release/${REF_NAME}/rpm||CentOS/RHEL TGZ|${BASE}/release/${REF_NAME}/tar" >> $GITHUB_OUTPUT
          else
            PREFIX="${BASE}/${{ github.ref_name }}/${{ github.run_number }}/${{ matrix.distro }}"
            echo "Uploading to s3://${BUCKET}/${PREFIX}/"
            aws s3 cp ./build "s3://${BUCKET}/${PREFIX}/" --recursive --exclude "*" --include "rocm-validation-suite*.rpm" --include "rocm-validation-suite*.tar.gz" --no-progress
            echo "Listing s3://${BUCKET}/${PREFIX}/"
            aws s3 ls "s3://${BUCKET}/${PREFIX}/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=CentOS/RHEL packages|${PREFIX}" >> $GITHUB_OUTPUT
          fi
          echo "Done."

  create-release:
    name: Create Release Summary
    needs: [build-ubuntu, build-centos]
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./packages

      - name: Display Package Structure
        run: |
          echo "=== Generated Packages ==="
          find ./packages -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" \) -exec ls -lh {} \;
          
          echo ""
          echo "=== Package Summary ==="
          echo "DEB packages:"
          find ./packages -name "*.deb" -exec basename {} \;
          echo ""
          echo "RPM packages:"
          find ./packages -name "*.rpm" -exec basename {} \;
          echo ""
          echo "TGZ packages:"
          find ./packages -name "*.tar.gz" -exec basename {} \;

      - name: Generate Build Report
        run: |
          cat > build-report.md << 'EOF'
          # ROCm Validation Suite - Build Report
          
          ## Build Information
          - **Commit**: ${{ github.sha }}
          - **Branch**: ${{ github.ref_name }}
          - **RVS Version**: ${{ env.RVS_VERSION }}
          - **ROCm Version**: ${{ env.ROCM_VERSION }}
          - **GPU Family**: ${{ env.GPU_FAMILY }}
          - **Build Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          ## Generated Packages
          
          ### Ubuntu Packages
          ```
          $(find ./packages -name "*.deb" -exec basename {} \;)
          ```
          
          ### CentOS/RHEL Packages
          ```
          $(find ./packages -name "*.rpm" -exec basename {} \;)
          ```
          
          ### TGZ Archives (Relocatable)
          ```
          $(find ./packages -name "*.tar.gz" -exec basename {} \;)
          ```
          
          ## Installation Instructions
          
          ### Ubuntu/Debian
          ```bash
          sudo dpkg -i rocm-validation-suite_*.deb
          ```
          
          ### CentOS/RHEL
          ```bash
          sudo rpm -i --replacefiles --nodeps rocm-validation-suite-*.rpm
          ```
          
          ### Relocatable TGZ (Any Linux Distribution)
          ```bash
          tar -xzf rocm-validation-suite-*.tar.gz -C /opt/
          export PATH=/opt/rocm/rvs/bin:$PATH
          export LD_LIBRARY_PATH=/opt/rocm/rvs/lib:$LD_LIBRARY_PATH
          ```
          
          ## Notes
          - All packages are built with relocatable RPATH settings
          - TGZ packages can be extracted to any location
          - Install path: /opt/rocm/rvs
          - ROCm SDK from TheRock nightly builds is used
          EOF
          
          cat build-report.md

      - name: Add S3 upload links to build report
        run: |
          BUCKET="${{ needs.build-ubuntu.outputs.s3_bucket_ubuntu }}"
          if [ -z "$BUCKET" ]; then
            BUCKET="${{ needs.build-centos.outputs.s3_bucket_centos }}"
          fi
          if [ -z "$BUCKET" ]; then
            echo "No S3 upload in this run, skipping S3 links section."
            exit 0
          fi
          echo "" >> build-report.md
          echo "## S3 Upload Locations" >> build-report.md
          echo "" >> build-report.md
          echo "Packages were uploaded to the following S3 locations (AWS Console links):" >> build-report.md
          echo "" >> build-report.md
          PATHS_UBUNTU="${{ needs.build-ubuntu.outputs.s3_paths_ubuntu }}"
          PATHS_CENTOS="${{ needs.build-centos.outputs.s3_paths_centos }}"
          echo "$PATHS_UBUNTU" | sed 's/||/\n/g' | while IFS= read -r part; do
            [ -z "$part" ] && continue
            label="${part%%|*}"; prefix="${part#*|}"
            enc=$(echo "$prefix" | sed 's|/|%2F|g')/
            echo "- [$label](https://s3.console.aws.amazon.com/s3/buckets/${BUCKET}?prefix=${enc})" >> build-report.md
          done
          echo "$PATHS_CENTOS" | sed 's/||/\n/g' | while IFS= read -r part; do
            [ -z "$part" ] && continue
            label="${part%%|*}"; prefix="${part#*|}"
            enc=$(echo "$prefix" | sed 's|/|%2F|g')/
            echo "- [$label](https://s3.console.aws.amazon.com/s3/buckets/${BUCKET}?prefix=${enc})" >> build-report.md
          done
          echo "" >> build-report.md
          cat build-report.md

      - name: Upload Build Report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-report.md
          retention-days: 90
