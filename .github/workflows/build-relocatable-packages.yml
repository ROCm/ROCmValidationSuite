name: Build Relocatable Packages

on:
  push:
    branches:
      - master
      - main
      - 'release/**'
  pull_request:
    branches:
      - master
      - main
  schedule:
    # Run daily at 5:00 AM PST (13:00 UTC; PST is UTC-8)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      rocm_version:
        description: 'ROCm version (e.g., 7.11.0a20260121)'
        required: false
        default: ''
      gpu_family:
        description: 'GPU family target'
        required: false
        type: choice
        options:
          - gfx94X-dcgpu
          - gfx950-dcgpu
          - gfx110X-all
          - gfx1151
          - gfx120X-all
        default: 'gfx110X-all'

permissions:
  contents: read
  id-token: write

env:
  ROCM_VERSION: ${{ vars.ROCM_VERSION || '7.11.0a20260121' }}
  GPU_FAMILY: ${{ vars.GPU_FAMILY || 'gfx110X-all' }}
  BUILD_TYPE: Release
  # Optional Step 6 in build_packages_local.sh: set repo Actions variable
  # RVS_AUTO_DETECT_LOCAL_UPLOAD to "1" to probe localhost:8080 when UPLOAD_TARGET is unset.
  # Leave the variable undefined for default (no probe; S3 uses workflow steps only).
  RVS_AUTO_DETECT_LOCAL_UPLOAD: ${{ vars.RVS_AUTO_DETECT_LOCAL_UPLOAD }}

jobs:
  build-ubuntu:
    name: Build Ubuntu Packages
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-22.04' }}
    strategy:
      matrix:
        ubuntu_version: ['22.04']
    outputs:
      s3_bucket_ubuntu: ${{ steps.upload-s3-ubuntu.outputs.bucket }}
      s3_paths_ubuntu: ${{ steps.upload-s3-ubuntu.outputs.paths }}
    
    steps:
      - name: Clean workspace
        run: |
          sudo rm -rf "${{ github.workspace }}/build" || true
          sudo chown -R $(id -u):$(id -g) "${{ github.workspace }}" || true

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set ROCm Version and GPU Family
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "ROCM_VERSION=" >> $GITHUB_ENV
            echo "Scheduled run: build script will auto-fetch latest ROCm version"
          elif [ -n "${{ github.event.inputs.rocm_version }}" ]; then
            echo "ROCM_VERSION=${{ github.event.inputs.rocm_version }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ github.event.inputs.gpu_family }}" ]; then
            echo "GPU_FAMILY=${{ github.event.inputs.gpu_family }}" >> $GITHUB_ENV
          fi

      - name: Build and Package RVS
        run: |
          chmod +x build_packages_local.sh
           # Run build script with sudo (Ubuntu runner needs sudo for apt-get)
          sudo -E ROCM_VERSION=${{ env.ROCM_VERSION }} \
          GPU_FAMILY=${{ env.GPU_FAMILY }} \
          BUILD_TYPE=${{ env.BUILD_TYPE }} \
          ROCM_SDK_BASE_URL=${{ vars.ROCM_SDK_BASE_URL }} \
          ROCM_SDK_INDEX_URL=${{ vars.ROCM_SDK_INDEX_URL }} \
          ./build_packages_local.sh

      - name: Fix file ownership
        if: always()
        run: |
          sudo chown -R $(id -u):$(id -g) "${{ github.workspace }}" || true

      - name: Verify DEB Package
        run: |
          cd ./build
          DEB_FILE=$(ls rocm-validation-suite*.deb | head -1)
          if [ -n "$DEB_FILE" ]; then
            echo "=== DEB Package Info ==="
            dpkg-deb -I "$DEB_FILE"
            echo ""
            echo "=== DEB Package Contents (first 30 files) ==="
            dpkg-deb -c "$DEB_FILE" | head -30
            echo ""
            echo "Package filename: $DEB_FILE"
          fi

      - name: Upload Ubuntu Packages
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-${{ matrix.ubuntu_version }}-packages-${{ env.GPU_FAMILY }}
          path: |
            build/rocm-validation-suite*.deb
            build/rocm-validation-suite*.tar.gz
          retention-days: 30

      # S3 upload only for repo ROCm/ROCmValidationSuite (schedule, release/* push, master/main push, or same-repo PR)
      - name: Install AWS CLI
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        run: sudo apt-get update && sudo apt-get install -y awscli

      - name: Configure AWS credentials
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "${{ secrets.AWS_ROLE_ARN }}" \
            --role-session-name "github-actions-${{ github.run_id }}" \
            --web-identity-token "$TOKEN" \
            --query 'Credentials' --output json)
          echo "AWS_ACCESS_KEY_ID=$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['AccessKeyId'])")" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['SecretAccessKey'])")" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['SessionToken'])")" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV
          echo "::add-mask::$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['SecretAccessKey'])")"
          echo "::add-mask::$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['SessionToken'])")"
        env:
          AWS_DEFAULT_REGION: us-east-1

      # vars.AWS_S3_BUCKET = repository variable. 
      # Paths: nightly → nightly/rocm-validation-suite/deb; 
      # release/* → release/rocm-validation-suite/deb; 
      # else → rocm-validation-suite/<ref>/<run_number>/ubuntu-22.04
      # tar.gz is uploaded only by the manylinux (CentOS) job
      - name: Upload Ubuntu packages to S3
        id: upload-s3-ubuntu
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          BUCKET="${{ vars.AWS_S3_BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "::warning::AWS_S3_BUCKET not set. Skipping S3 upload."
            exit 0
          fi
          BASE="rocm-validation-suite"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled build: uploading to nightly/rocm-validation-suite/deb"
            aws s3 cp ./build "s3://${BUCKET}/nightly/${BASE}/deb/" --recursive --exclude "*" --include "rocm-validation-suite*.deb" --no-progress
            echo "Listing s3://${BUCKET}/nightly/${BASE}/deb/"
            aws s3 ls "s3://${BUCKET}/nightly/${BASE}/deb/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=Ubuntu DEB|nightly/${BASE}/deb" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "Release branch build: uploading to release/rocm-validation-suite/deb"
            aws s3 cp ./build "s3://${BUCKET}/release/${BASE}/deb/" --recursive --exclude "*" --include "rocm-validation-suite*.deb" --no-progress
            echo "Listing s3://${BUCKET}/release/${BASE}/deb/"
            aws s3 ls "s3://${BUCKET}/release/${BASE}/deb/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=Ubuntu DEB|release/${BASE}/deb" >> $GITHUB_OUTPUT
          else
            PREFIX="${BASE}/${{ github.ref_name }}/${{ github.run_number }}/ubuntu-${{ matrix.ubuntu_version }}"
            echo "Uploading to s3://${BUCKET}/${PREFIX}/"
            aws s3 cp ./build "s3://${BUCKET}/${PREFIX}/" --recursive --exclude "*" --include "rocm-validation-suite*.deb" --no-progress
            echo "Listing s3://${BUCKET}/${PREFIX}/"
            aws s3 ls "s3://${BUCKET}/${PREFIX}/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=Ubuntu DEB|${PREFIX}" >> $GITHUB_OUTPUT
          fi
          echo "Done."

      # Generate APT repo metadata (Packages, Packages.gz, Release) so the S3 path
      # can be consumed directly as a DEB repository by apt.     
      - name: Generate and upload DEB repo metadata to S3
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))))
        run: |
          BUCKET="${{ vars.AWS_S3_BUCKET }}"
          [ -z "$BUCKET" ] && exit 0

          sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils

          BASE="rocm-validation-suite"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DEB_PREFIX="nightly/${BASE}/deb"
          else
            DEB_PREFIX="release/${BASE}/deb"
          fi

          STAGING=$(mktemp -d)

          echo "Downloading existing DEBs from s3://${BUCKET}/${DEB_PREFIX}/ ..."
          aws s3 sync "s3://${BUCKET}/${DEB_PREFIX}/" "$STAGING/" \
            --exclude "Packages*" --exclude "Release*" --exclude "InRelease" \
            --no-progress || true

          cp ./build/rocm-validation-suite*.deb "$STAGING/" 2>/dev/null || true

          cd "$STAGING"
          dpkg-scanpackages --multiversion . /dev/null > Packages
          gzip -k -f Packages
          apt-ftparchive release . > Release

          aws s3 sync "$STAGING/" "s3://${BUCKET}/${DEB_PREFIX}/" --no-progress

          echo "=== DEB repo metadata uploaded to s3://${BUCKET}/${DEB_PREFIX}/ ==="
          aws s3 ls "s3://${BUCKET}/${DEB_PREFIX}/" --human-readable

  build-centos:
    name: Build CentOS/RHEL Packages (manylinux_2_28)
    runs-on: ${{ vars.RUNNER_LABEL_CONTAINER || 'ubuntu-latest' }}
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    strategy:
      matrix:
        distro: ['manylinux_2_28']
    outputs:
      s3_bucket_centos: ${{ steps.upload-s3-centos.outputs.bucket }}
      s3_paths_centos: ${{ steps.upload-s3-centos.outputs.paths }}
    
    steps:
      - name: Install Git (for checkout)
        run: |
          yum install -y git

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set ROCm Version and GPU Family
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "ROCM_VERSION=" >> $GITHUB_ENV
            echo "Scheduled run: build script will auto-fetch latest ROCm version"
          elif [ -n "${{ github.event.inputs.rocm_version }}" ]; then
            echo "ROCM_VERSION=${{ github.event.inputs.rocm_version }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ github.event.inputs.gpu_family }}" ]; then
            echo "GPU_FAMILY=${{ github.event.inputs.gpu_family }}" >> $GITHUB_ENV
          fi

      - name: Build and Package RVS
        run: |
          chmod +x build_packages_local.sh
          
          ROCM_VERSION=${{ env.ROCM_VERSION }} \
          GPU_FAMILY=${{ env.GPU_FAMILY }} \
          BUILD_TYPE=${{ env.BUILD_TYPE }} \
          ROCM_SDK_BASE_URL=${{ vars.ROCM_SDK_BASE_URL }} \
          ROCM_SDK_INDEX_URL=${{ vars.ROCM_SDK_INDEX_URL }} \
          ./build_packages_local.sh

      - name: Verify RPM Package
        run: |
          cd ./build
          RPM_FILE=$(ls rocm-validation-suite*.rpm | head -1)
          if [ -n "$RPM_FILE" ]; then
            echo "=== RPM Package Info ==="
            rpm -qip "$RPM_FILE"
            echo ""
            echo "=== RPM Package Contents (first 30 files) ==="
            rpm -qlp "$RPM_FILE" | head -30
            echo ""
            echo "=== RPM Dependencies ==="
            rpm -qRp "$RPM_FILE"
            echo ""
            echo "Package filename: $RPM_FILE"
          fi

      - name: Upload CentOS/RHEL Packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.distro }}-packages-${{ env.GPU_FAMILY }}
          path: |
            build/rocm-validation-suite*.rpm
            build/rocm-validation-suite*.tar.gz
          retention-days: 30

      # S3 upload only for repo ROCm/ROCmValidationSuite 
      # (schedule, release/* push, master/main push, or same-repo PR)
      - name: Install AWS CLI
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          python3 -m pip install --break-system-packages awscli || (yum install -y python3-pip && pip3 install awscli)

      - name: Configure AWS credentials
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "${{ secrets.AWS_ROLE_ARN }}" \
            --role-session-name "github-actions-${{ github.run_id }}" \
            --web-identity-token "$TOKEN" \
            --query 'Credentials' --output json)
          echo "AWS_ACCESS_KEY_ID=$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['AccessKeyId'])")" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['SecretAccessKey'])")" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['SessionToken'])")" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV
          echo "::add-mask::$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['SecretAccessKey'])")"
          echo "::add-mask::$(echo "$CREDS" | python3 -c "import sys,json; print(json.load(sys.stdin)['SessionToken'])")"
        env:
          AWS_DEFAULT_REGION: us-east-1

      # vars.AWS_S3_BUCKET = repository variable. 
      # Paths: nightly (schedule) → nightly/rocm-validation-suite/rpm,tar; 
      # release/* → release/rocm-validation-suite/rpm,tar; 
      # else → rocm-validation-suite/<ref>/<run_number>/manylinux_2_28
      - name: Upload CentOS/RHEL packages to S3
        id: upload-s3-centos
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
        run: |
          BUCKET="${{ vars.AWS_S3_BUCKET }}"
          if [ -z "$BUCKET" ]; then
            echo "::warning::AWS_S3_BUCKET not set. Skipping S3 upload."
            exit 0
          fi
          BASE="rocm-validation-suite"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Scheduled build: uploading to nightly/rocm-validation-suite/rpm and nightly/rocm-validation-suite/tar"
            aws s3 cp ./build "s3://${BUCKET}/nightly/${BASE}/rpm/" --recursive --exclude "*" --include "rocm-validation-suite*.rpm" --no-progress
            aws s3 cp ./build "s3://${BUCKET}/nightly/${BASE}/tar/" --recursive --exclude "*" --include "rocm-validation-suite*.tar.gz" --no-progress
            echo "Listing s3://${BUCKET}/nightly/${BASE}/rpm/"
            aws s3 ls "s3://${BUCKET}/nightly/${BASE}/rpm/" --human-readable
            echo "Listing s3://${BUCKET}/nightly/${BASE}/tar/"
            aws s3 ls "s3://${BUCKET}/nightly/${BASE}/tar/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=CentOS/RHEL RPM|nightly/${BASE}/rpm||CentOS/RHEL TGZ|nightly/${BASE}/tar" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "Release branch build: uploading to release/rocm-validation-suite/rpm and release/rocm-validation-suite/tar"
            aws s3 cp ./build "s3://${BUCKET}/release/${BASE}/rpm/" --recursive --exclude "*" --include "rocm-validation-suite*.rpm" --no-progress
            aws s3 cp ./build "s3://${BUCKET}/release/${BASE}/tar/" --recursive --exclude "*" --include "rocm-validation-suite*.tar.gz" --no-progress
            echo "Listing s3://${BUCKET}/release/${BASE}/rpm/"
            aws s3 ls "s3://${BUCKET}/release/${BASE}/rpm/" --human-readable
            echo "Listing s3://${BUCKET}/release/${BASE}/tar/"
            aws s3 ls "s3://${BUCKET}/release/${BASE}/tar/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=CentOS/RHEL RPM|release/${BASE}/rpm||CentOS/RHEL TGZ|release/${BASE}/tar" >> $GITHUB_OUTPUT
          else
            PREFIX="${BASE}/${{ github.ref_name }}/${{ github.run_number }}/${{ matrix.distro }}"
            echo "Uploading to s3://${BUCKET}/${PREFIX}/"
            aws s3 cp ./build "s3://${BUCKET}/${PREFIX}/" --recursive --exclude "*" --include "rocm-validation-suite*.rpm" --include "rocm-validation-suite*.tar.gz" --no-progress
            echo "Listing s3://${BUCKET}/${PREFIX}/"
            aws s3 ls "s3://${BUCKET}/${PREFIX}/" --human-readable
            echo "bucket=${BUCKET}" >> $GITHUB_OUTPUT
            echo "paths=CentOS/RHEL packages|${PREFIX}" >> $GITHUB_OUTPUT
          fi
          echo "Done."
      
      # Generate YUM/DNF repo metadata (repodata/) so the S3 path can be consumed
      # directly as an RPM repository by yum/dnf.
      - name: Generate and upload RPM repodata to S3
        if: github.repository == 'ROCm/ROCmValidationSuite' && (github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))))
        run: |
          BUCKET="${{ vars.AWS_S3_BUCKET }}"
          [ -z "$BUCKET" ] && exit 0

          yum install -y createrepo_c || yum install -y createrepo

          BASE="rocm-validation-suite"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            RPM_PREFIX="nightly/${BASE}/rpm"
          else
            RPM_PREFIX="release/${BASE}/rpm"
          fi

          STAGING=$(mktemp -d)

          echo "Downloading existing RPMs from s3://${BUCKET}/${RPM_PREFIX}/ ..."
          aws s3 sync "s3://${BUCKET}/${RPM_PREFIX}/" "$STAGING/" \
            --exclude "repodata/*" --no-progress || true

          cp ./build/rocm-validation-suite*.rpm "$STAGING/" 2>/dev/null || true

          createrepo_c "$STAGING" || createrepo "$STAGING"

          aws s3 sync "$STAGING/" "s3://${BUCKET}/${RPM_PREFIX}/" --no-progress

          echo "=== RPM repodata uploaded to s3://${BUCKET}/${RPM_PREFIX}/repodata/ ==="
          aws s3 ls "s3://${BUCKET}/${RPM_PREFIX}/repodata/" --human-readable

  create-release:
    name: Create Release Summary
    needs: [build-ubuntu, build-centos]
    runs-on: ${{ vars.RUNNER_LABEL_UTILITY || 'ubuntu-latest' }}
    if: github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./packages

      - name: Display Package Structure
        run: |
          echo "=== Generated Packages ==="
          find ./packages -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" \) -exec ls -lh {} \;
          
          echo ""
          echo "=== Package Summary ==="
          echo "DEB packages:"
          find ./packages -name "*.deb" -exec basename {} \;
          echo ""
          echo "RPM packages:"
          find ./packages -name "*.rpm" -exec basename {} \;
          echo ""
          echo "TGZ packages:"
          find ./packages -name "*.tar.gz" -exec basename {} \;

      - name: Generate Build Report
        run: |
          cat > build-report.md << 'EOF'
          # ROCm Validation Suite - Build Report
          
          ## Build Information
          - **Commit**: ${{ github.sha }}
          - **Branch**: ${{ github.ref_name }}
          - **RVS Version**: ${{ env.RVS_VERSION }}
          - **ROCm Version**: ${{ env.ROCM_VERSION }}
          - **GPU Family**: ${{ env.GPU_FAMILY }}
          - **Build Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          ## Generated Packages
          
          ### Ubuntu Packages
          ```
          $(find ./packages -name "*.deb" -exec basename {} \;)
          ```
          
          ### CentOS/RHEL Packages
          ```
          $(find ./packages -name "*.rpm" -exec basename {} \;)
          ```
          
          ### TGZ Archives (Relocatable)
          ```
          $(find ./packages -name "*.tar.gz" -exec basename {} \;)
          ```
          
          ## Installation Instructions
          
          ### Ubuntu/Debian
          ```bash
          sudo dpkg -i rocm-validation-suite_*.deb
          ```
          
          ### CentOS/RHEL
          ```bash
          sudo rpm -i --replacefiles --nodeps rocm-validation-suite-*.rpm
          ```
          
          ### Relocatable TGZ (Any Linux Distribution)
          ```bash
          tar -xzf rocm-validation-suite-*.tar.gz -C /opt/
          export PATH=/opt/rocm/rvs/bin:$PATH
          export LD_LIBRARY_PATH=/opt/rocm/rvs/lib:$LD_LIBRARY_PATH
          ```
          
          ## Notes
          - All packages are built with relocatable RPATH settings
          - TGZ packages can be extracted to any location
          - Install path: /opt/rocm/rvs
          - ROCm SDK from TheRock nightly builds is used
          EOF
          
          cat build-report.md

      - name: Add S3 upload links to build report
        run: |
          BUCKET="${{ needs.build-ubuntu.outputs.s3_bucket_ubuntu }}"
          if [ -z "$BUCKET" ]; then
            BUCKET="${{ needs.build-centos.outputs.s3_bucket_centos }}"
          fi
          if [ -z "$BUCKET" ]; then
            echo "No S3 upload in this run, skipping S3 links section."
            exit 0
          fi
          echo "" >> build-report.md
          echo "## S3 Upload Locations" >> build-report.md
          echo "" >> build-report.md
          echo "Packages were uploaded to the following S3 locations (AWS Console links):" >> build-report.md
          echo "" >> build-report.md
          PATHS_UBUNTU="${{ needs.build-ubuntu.outputs.s3_paths_ubuntu }}"
          PATHS_CENTOS="${{ needs.build-centos.outputs.s3_paths_centos }}"
          echo "$PATHS_UBUNTU" | sed 's/||/\n/g' | while IFS= read -r part; do
            [ -z "$part" ] && continue
            label="${part%%|*}"; prefix="${part#*|}"
            enc=$(echo "$prefix" | sed 's|/|%2F|g')/
            echo "- [$label](https://s3.console.aws.amazon.com/s3/buckets/${BUCKET}?prefix=${enc})" >> build-report.md
          done
          echo "$PATHS_CENTOS" | sed 's/||/\n/g' | while IFS= read -r part; do
            [ -z "$part" ] && continue
            label="${part%%|*}"; prefix="${part#*|}"
            enc=$(echo "$prefix" | sed 's|/|%2F|g')/
            echo "- [$label](https://s3.console.aws.amazon.com/s3/buckets/${BUCKET}?prefix=${enc})" >> build-report.md
          done
          echo "" >> build-report.md
          cat build-report.md

      - name: Upload Build Report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-report.md
          retention-days: 90
