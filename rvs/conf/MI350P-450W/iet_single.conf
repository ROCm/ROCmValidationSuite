# IET test - MI350P power validation using typed GEMM via hipBLASLt
#
# Preconditions:
#   Set device to all. If you need to run the rvs only on a subset of GPUs, please run rvs with -g
#   option, collect the GPUs IDs (e.g.: GPU[ 5 - 50599] -> 50599 is the GPU ID) and then specify
#   all the GPUs IDs separated by white space
#   Set blas source (backend) as hipblaslt
#   Set target power according to MI350P TDP
#
# Run test with:
#   cd bin
#   ./rvs -c conf/MI350P/iet_single.conf
#
# Expected result:
#   The test on each GPU passes (TRUE) if the GPU power reaches at least
#   the target_power threshold, FALSE otherwise

actions:
- name: iet-8K8K16K-bf16
  device: all
  module: iet
  parallel: true
  duration: 30000
  hot_calls: 500
  sample_interval: 1000
  log_interval: 3000
  target_power: 450
  matrix_size_a: 8192
  matrix_size_b: 8192
  matrix_size_c: 16384
  matrix_init: trig
  data_type: bf16_r
  compute_type: fp32_r
  transa: 0
  transb: 0
  alpha: 1
  beta: 1
  blas_source: hipblaslt

- name: iet-wait-8K8K16K-fp16
  device: all
  module: iet
  parallel: true
  wait: 5000
  duration: 30000
  hot_calls: 500
  sample_interval: 1000
  log_interval: 3000
  target_power: 450 
  matrix_size_a: 8192
  matrix_size_b: 8192
  matrix_size_c: 16384
  matrix_init: trig
  data_type: fp16_r
  compute_type: fp32_r
  transa: 0
  transb: 0
  alpha: 1
  beta: 1
  blas_source: hipblaslt

- name: iet-wait-8K8K16K-fp8
  device: all
  module: iet
  parallel: true
  duration: 25000
  hot_calls: 500
  sample_interval: 1000
  log_interval: 3000
  target_power: 450 
  matrix_size_a: 8192
  matrix_size_b: 8192
  matrix_size_c: 16384
  matrix_init: trig
  data_type: fp8_e4m3_r
  compute_type: fp32_r
  transa: 0
  transb: 0
  alpha: 1
  beta: 1
  blas_source: hipblaslt

- name: iet-wait-stress-bw
  device: all
  module: iet
  parallel: true
  wait: 8000
  duration: 40000
  sample_interval: 1000
  target_power: 450
  bw_workload: true
  cp_workload: false
  tolerance: 0.05
