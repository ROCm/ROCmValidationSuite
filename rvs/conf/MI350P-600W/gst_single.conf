# GST test - gst-96Tflops-8K12K4K-trig-tf32
#
# Preconditions:
#   Set device to all. If you need to run the rvs only on a subset of GPUs, please run rvs with -g
#   option, collect the GPUs IDs (e.g.: GPU[ 5 - 50599] -> 50599 is the GPU ID) and then specify
#   all the GPUs IDs separated by white space
#   Set matrices sizes to 8192 * 12288 * 4096
#   Set matrix data type as fp32 real number
#   Set compute type as tf32 (xf32)
#   Set matrix data initialization method as trignometric float
#   Set copy_matrix to false (the matrices will be copied to GPUs only once)
#   Set target stress GFLOPS as 96 TFLOPS
#   Set blas source (backend) as hipblaslt
#
# Expected result:
#   The test on each GPU passes (TRUE) if the GPU achieves 96 TFLOPS or more
#   within the test duration of 15 seconds after ramp-up duration of 5 seconds.
#   Else test on the GPU fails (FALSE).

actions:
- name: gst-8K8K16K-trig-bf16
  device: all
  module: gst
  log_interval: 3000
  ramp_interval: 5000
  duration: 15000
  hot_calls: 10000
  copy_matrix: false
  target_stress: 0
  matrix_size_a: 8192
  matrix_size_b: 8192
  matrix_size_c: 16384
  matrix_init: trig
  data_type: bf16_r
  out_data_type: bf16_r
  compute_type: fp32_r
  transa: 1
  transb: 0
  alpha: 1.000000
  beta: 0.000000
  rotating: 512
  blas_source: hipblaslt

- name: gst-8K8K16K-trig-fp16
  device: all
  module: gst
  log_interval: 3000
  ramp_interval: 5000
  duration: 15000
  hot_calls: 10000
  copy_matrix: false
  target_stress: 0
  matrix_size_a: 8192
  matrix_size_b: 8192
  matrix_size_c: 16384
  matrix_init: trig
  data_type: fp16_r
  out_data_type: fp16_r
  compute_type: fp32_r
  transa: 1
  transb: 0
  alpha: 1.000000
  beta: 0.000000
  rotating: 512
  blas_source: hipblaslt

- name: gst-8K8K16K-trig-fp8
  device: all
  module: gst
  log_interval: 3000
  ramp_interval: 5000
  duration: 15000
  hot_calls: 10000
  copy_matrix: false
  target_stress: 0
  matrix_size_a: 8192
  matrix_size_b: 8192
  matrix_size_c: 16384
  matrix_init: trig
  data_type: fp8_e4m3_r
  out_data_type: bf16_r
  compute_type: fp32_r
  transa: 1
  transb: 0
  alpha: 1.000000
  beta: 0.000000
  rotating: 512
  blas_source: hipblaslt

- name: gst-Tflops-4K4K32K-trig-fp4
  device: all
  module: gst
  log_interval: 3000
  ramp_interval: 5000
  duration: 15000
  hot_calls: 1000
  copy_matrix: false
  target_stress: 0
  matrix_size_a: 4096
  matrix_size_b: 4096
  matrix_size_c: 32768
  scale_a: block
  scale_b: block
  matrix_init: trig
  data_type: fp4_r
  out_data_type: fp16_r
  compute_type: fp32_r
  transa: 1
  transb: 0
  alpha: 1
  beta: 0
  blas_source: hipblaslt

- name: gst-Tflops-4K4K16K-trig-bf8
  module: gst
  device: all
  matrix_init: trig
  target_stress: 0
  data_type: fp8_e5m2_r     # BF8 (OCP E5M2)  -> HIP_R_8F_E5M2
  out_data_type: bf16_r
  compute_type: fp32_r
  matrix_size_a: 4096
  matrix_size_b: 4096
  matrix_size_c: 16384
  transa: 1
  transb: 0
  alpha: 1
  beta: 0
  duration: 15000
  hot_calls: 1000
  blas_source: hipblaslt

- name: gst-Tflops-4K4K32K-trig-fp6
  module: gst
  device: all
  target_stress: 0
  matrix_init: trig
  data_type: fp6_e3m2_r     # MX FP6 E3M2  -> HIP_R_6F_E3M2
  out_data_type: fp16_r
  compute_type: fp32_r
  scale_a: block
  scale_b: block
  matrix_size_a: 4096
  matrix_size_b: 4096
  matrix_size_c: 32768
  transa: 1
  transb: 0
  alpha: 1
  beta: 0
  duration: 15000
  blas_source: hipblaslt

