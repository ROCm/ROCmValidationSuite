# GPU Power Pulse Stress Test Configuration
#
# This test creates rapid power fluctuations by alternating between
# high-compute (GEMM) and idle phases at a configurable rate.
# When running in parallel on multiple GPUs, a two-level barrier
# (CPU + GPU fine-grained atomics) synchronizes all GPUs so they
# spike current simultaneously, maximizing stress on the PSU.
#
# Failure conditions:
#   - Thermal violations (junction temperature > 105 C)
#   - GEMM compute errors (data corruption)
#   - Power supply unable to handle transient spikes
#
# Prerequisites:
#   - Sufficient permissions for clock manipulation via AMD SMI
#   - rocBLAS installed and accessible

actions:
- name: pulse_stress_basic
  device: all
  module: pulse
  parallel: true
  duration: 60000
  sample_interval: 100
  log_interval: 5000
  pulse_rate: 100
  high_phase_ratio: 0.6
  ops_type: sgemm
  matrix_size: 4096
  alpha: 2.0
  beta: -1.0
  tolerance: 10.0
  workload_iterations: 64
  halt_on_error: false
  gpu_sync_wait: 10000
  verify_mode: diff
  blas_source: rocblas

- name: pulse_stress_aggressive
  device: all
  module: pulse
  parallel: true
  duration: 120000
  sample_interval: 50
  log_interval: 5000
  pulse_rate: 500
  high_phase_ratio: 0.7
  ops_type: sgemm
  matrix_size: 8192
  alpha: 2.0
  beta: -1.0
  tolerance: 10.0
  workload_iterations: 128
  halt_on_error: true
  gpu_sync_wait: 10000
  verify_mode: diff
  blas_source: rocblas

- name: pulse_stress_dgemm
  device: all
  module: pulse
  parallel: true
  duration: 60000
  sample_interval: 100
  log_interval: 5000
  pulse_rate: 50
  high_phase_ratio: 0.5
  ops_type: dgemm
  matrix_size: 4096
  alpha: 2.0
  beta: -1.0
  tolerance: 10.0
  workload_iterations: 32
  halt_on_error: false
  gpu_sync_wait: 10000
  verify_mode: diff
  blas_source: rocblas
