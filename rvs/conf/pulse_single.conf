# GPU Power Pulse Stress Test Configuration
#
# This test creates power fluctuations by alternating between
# high-compute (GEMM) and idle phases at a configurable rate.
# When running in parallel on multiple GPUs, a two-level barrier
# (CPU + GPU fine-grained atomics) synchronizes all GPUs so they
# spike current simultaneously, maximizing stress on the PSU.
#
# TUNING GUIDANCE:
#   pulse_rate      - Hz.  Use 1-5 Hz for visible power deltas.
#                     Higher rates (>50 Hz) produce phases shorter
#                     than the GPU power state transition time and
#                     the SMI power reporting window (~100ms), so
#                     the high/low readings converge.
#   high_phase_ratio - fraction of the period spent under load.
#                     0.5 = equal high/low.  Lower values give the
#                     GPU more time to idle and drop power.
#   matrix_size     - larger matrices draw more power.  8192+
#                     recommended for GPUs with >500W TDP.
#
# Failure conditions:
#   - Thermal: junction (or edge) temperature exceeds max_temp_c (°C)
#   - GEMM compute errors (data corruption)
#   - Power supply unable to handle transient spikes
#
# max_temp_c (float, °C): fail the high phase if reported temp exceeds this.
#   Default in module is 105 if omitted. Use 0 to disable the thermal check.
#
# verify_mode: GEMM check runs once at end of the action (not every pulse).
#   diff/crc/both — for matrix_size > 2048, CPU accuracy is skipped (self-check
#   only) because full CPU reference GEMM would stall for a very long time.
# gpu_sync_wait: parsed for compatibility; barrier uses device sync on stream 0.
#


actions:
- name: pulse_stress_basic
  device: all
  module: pulse
  parallel: true
  duration: 60000
  sample_interval: 100
  log_interval: 5000
  pulse_rate: 2
  high_phase_ratio: 0.5
  ops_type: sgemm
  matrix_size: 8192
  matrix_init: trig
  alpha: 2.0
  beta: -1.0
  tolerance: 10.0
  workload_iterations: 128
  halt_on_error: false
  gpu_sync_wait: 10000
  verify_mode: diff
  max_temp_c: 105
  blas_source: hipblaslt
  data_type: fp32_r
  compute_type: fp32_r

- name: pulse_stress_aggressive
  device: all
  module: pulse
  parallel: true
  duration: 120000
  sample_interval: 50
  log_interval: 5000
  pulse_rate: 1
  high_phase_ratio: 0.6
  ops_type: sgemm
  matrix_size: 16384
  alpha: 2.0
  beta: -1.0
  tolerance: 10.0
  workload_iterations: 256
  halt_on_error: true
  gpu_sync_wait: 10000
  verify_mode: diff
  max_temp_c: 105
  blas_source: hipblaslt
  data_type: fp32_r
  compute_type: fp32_r

- name: pulse_stress_fp16
  device: all
  module: pulse
  parallel: true
  duration: 60000
  sample_interval: 100
  log_interval: 5000
  pulse_rate: 2
  high_phase_ratio: 0.5
  ops_type: hgemm
  matrix_size: 8192
  matrix_init: trig
  alpha: 2.0
  beta: -1.0
  tolerance: 10.0
  workload_iterations: 128
  halt_on_error: false
  gpu_sync_wait: 10000
  verify_mode: diff
  max_temp_c: 105
  blas_source: hipblaslt
  data_type: fp16_r
  compute_type: fp32_r
